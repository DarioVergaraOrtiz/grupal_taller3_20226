version: '3.8'

name: spring-advisor

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-db
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      # Utilizamos un volumen local manejado por Docker en lugar de una ruta estricta de Windows,
      # lo que permite ejecutarlo de igual forma en Linux (AWS) o localmente.
      - qdrant_data:/qdrant/storage
    networks:
      - app-network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spring-advisor-backend
    depends_on:
      - qdrant
    environment:
      # Variables de entorno para que Spring Boot conecte con Qdrant a través de la red de Docker
      - SPRING_AI_VECTORSTORE_QDRANT_HOST=qdrant
      - SPRING_AI_VECTORSTORE_QDRANT_PORT=6334
    ports:
      - "8080:8080"
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: spring-advisor-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  qdrant_data:
