version: '3.8'

name: spring-advisor

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-db
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      # Utilizamos un volumen local manejado por Docker en lugar de una ruta estricta de Windows,
      # lo que permite ejecutarlo de igual forma en Linux (AWS) o localmente.
      - qdrant_data:/qdrant/storage
    networks:
      - app-network
    restart: unless-stopped

  backend:
    image: dariovergara/ucegemini:backend
    container_name: spring-advisor-backend
    depends_on:
      - qdrant
    environment:
      - SPRING_AI_VECTORSTORE_QDRANT_HOST=qdrant
      - SPRING_AI_VECTORSTORE_QDRANT_PORT=6334
      - APP_KEY=${GEMINI_API_KEY}
    ports:
      - "8091:8091"
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    image: dariovergara/ucegemini:frontend
    container_name: spring-advisor-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - app-network
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-tunnel
    command: tunnel --url http://frontend:80
    depends_on:
      - frontend
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  qdrant_data:
