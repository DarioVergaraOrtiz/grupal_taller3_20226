server {
    listen 80;
    server_name localhost;
    
    root /usr/share/nginx/html;
    index index.html;

    # Proxy reverso: enviar peticiones /api/* al backend Spring Boot
    location /api/ {
        proxy_pass http://backend:8091/api/;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # Todas las rutas redirigen al index.html para soportar React Router (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Caché para recursos estáticos (CSS, JS, imágenes, etc.)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Deshabilitar logs para favicon y robots
    location = /favicon.ico { log_not_found off; access_log off; }
    location = /robots.txt  { log_not_found off; access_log off; }
}
