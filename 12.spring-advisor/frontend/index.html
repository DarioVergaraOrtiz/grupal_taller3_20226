<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Asistente Académico RAG - Casa Abierta UCE. Consulta información sobre titulación, proyecto integrador y normativa universitaria." />
    <title>Casa Abierta UCE - Asistente Académico</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="logo">
            <div class="logo-icon">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
              </svg>
            </div>
            <div class="logo-text">
              <h1>Casa Abierta</h1>
              <span>UCE Advisor</span>
            </div>
          </div>
        </div>

        <button class="btn-new-chat" id="btn-new-chat">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Nueva Conversación
        </button>

        <div class="sidebar-section">
          <h3 class="sidebar-section-title">Sesiones</h3>
          <div class="sessions-list" id="sessions-list">
            <!-- Sessions rendered dynamically -->
          </div>
        </div>

        <div class="sidebar-footer">
          <div class="sidebar-info">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>
            </svg>
            <span>Gemma 4B · RAG Local</span>
          </div>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Toggle Sidebar (mobile) -->
        <button class="btn-toggle-sidebar" id="btn-toggle-sidebar">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>

        <!-- Chat Area -->
        <div class="chat-area" id="chat-area">
          <!-- Welcome Screen -->
          <div class="welcome-screen" id="welcome-screen">
            <div class="welcome-icon">
              <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="url(#grad1)" stroke-width="1.5">
                <defs>
                  <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#6366f1"/>
                    <stop offset="100%" style="stop-color:#a855f7"/>
                  </linearGradient>
                </defs>
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
              </svg>
            </div>
            <h2>Asistente Académico</h2>
            <p>Casa Abierta - Universidad Central del Ecuador</p>
            <div class="welcome-cards">
              <button class="welcome-card" data-prompt="¿Cuáles son los requisitos para titulación?">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/>
                </svg>
                <span>Requisitos de titulación</span>
              </button>
              <button class="welcome-card" data-prompt="¿Qué es el proyecto integrador y cuál es su formato?">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
                </svg>
                <span>Proyecto integrador</span>
              </button>
              <button class="welcome-card" data-prompt="¿Cuáles son los plazos importantes para el proceso de titulación?">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                </svg>
                <span>Plazos y fechas clave</span>
              </button>
            </div>
          </div>

          <!-- Messages Container -->
          <div class="messages-container" id="messages-container">
          </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
          <div class="input-wrapper">
            <textarea
              id="message-input"
              placeholder="Escribe tu consulta académica..."
              rows="1"
              maxlength="2000"
            ></textarea>
            <button class="btn-send" id="btn-send" disabled>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>
          <div class="input-footer">
            <span class="session-indicator" id="session-indicator">Sesión: --</span>
            <span class="char-count" id="char-count">0 / 2000</span>
          </div>
        </div>
      </main>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
